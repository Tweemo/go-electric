# Brings up the Go API and the Next.js UI together.
#   docker compose up --build
# Then open http://localhost:3001
#
# Note: the browser (not the frontend container) calls the API, so the API must
# be reachable from the host. That's why NEXT_PUBLIC_API_URL and CORS both use
# http://localhost:8080 / http://localhost:3001 rather than compose service names.

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      HOST: 0.0.0.0
      PORT: "8080"
      ENV: production
      GIN_MODE: release
      CORS_ALLOWED_ORIGINS: http://localhost:3001

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3001:3000"
    depends_on:
      - backend
